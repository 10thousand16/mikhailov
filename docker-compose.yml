version: '3'

services:
  web:
    build: .
    container_name: django_app
    volumes:
      - .:/app
    expose:
      - "8000"
    # команда запуска Django (при необходимости переопределите)
    command: python manage.py runserver 0.0.0.0:8000

  caddy:
    image: caddy:latest
    container_name: caddy_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - web